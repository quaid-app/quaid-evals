name: Run Benchmarks (Manual)

on:
  workflow_dispatch:
    inputs:
      quaid_version:
        description: 'Quaid version to test (e.g. v1.0.0 or "latest")'
        required: false
        default: 'latest'
      benchmarks:
        description: 'Benchmarks to run (comma-separated: dab,gbrain-evals,beam)'
        required: false
        default: 'dab,gbrain-evals'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Quaid
        run: bash scripts/install-quaid.sh "${{ inputs.quaid_version }}"

      - name: Set up corpus
        run: bash scripts/setup-corpus.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run DAB benchmark
        if: contains(inputs.benchmarks, 'dab')
        run: bash benchmarks/dab/run.sh

      - name: Run gbrain-evals benchmark
        if: contains(inputs.benchmarks, 'gbrain-evals')
        run: bash benchmarks/gbrain-evals/run.sh

      - name: Run BEAM benchmark
        if: contains(inputs.benchmarks, 'beam')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: bash benchmarks/beam/run.sh

      - name: Generate report
        run: python scripts/generate-report.py

      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "benchmark: add results for quaid ${{ inputs.quaid_version }}"
          file_pattern: 'results/*.json site/src/data/*.json'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Astro site
        working-directory: site
        run: npm ci && npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/dist
