name: Run Benchmarks (Manual)

on:
  workflow_dispatch:
    inputs:
      quaid_version:
        description: 'Quaid version to test (e.g. v1.0.0 or "latest")'
        required: false
        default: 'latest'
      benchmarks:
        description: 'Benchmarks to run (comma-separated: dab,gbrain-evals,locomo,longmemeval,beam)'
        required: false
        default: 'dab,gbrain-evals,locomo'
      lme_max_questions:
        description: 'LongMemEval max questions (leave blank for full 500)'
        required: false
        default: ''
      beam_split:
        description: 'BEAM split to run (100K, 500K, 1M, 10M)'
        required: false
        default: '100K'
      beam_max_conversations:
        description: 'BEAM max conversations (leave blank for full split)'
        required: false
        default: ''

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5 hours - LongMemEval full run ~2.5hrs
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Quaid
        run: bash scripts/install-quaid.sh "${{ inputs.quaid_version }}"

      - name: Set up corpus
        run: bash scripts/setup-corpus.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run DAB benchmark
        if: contains(inputs.benchmarks, 'dab')
        run: bash benchmarks/dab/run.sh

      - name: Run gbrain-evals benchmark
        if: contains(inputs.benchmarks, 'gbrain-evals')
        run: bash benchmarks/gbrain-evals/run.sh

      - name: Run LoCoMo benchmark
        if: contains(inputs.benchmarks, 'locomo')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash benchmarks/locomo/run.sh

      - name: Run LongMemEval benchmark
        if: contains(inputs.benchmarks, 'longmemeval')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAX_QUESTIONS: ${{ inputs.lme_max_questions }}
        run: bash benchmarks/longmemeval/run.sh

      - name: Run BEAM benchmark
        if: contains(inputs.benchmarks, 'beam')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BEAM_SPLIT: ${{ inputs.beam_split }}
          MAX_CONVERSATIONS: ${{ inputs.beam_max_conversations }}
        run: bash benchmarks/beam/run.sh

      - name: Generate report
        run: python scripts/generate-report.py

      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "benchmark: add results for quaid ${{ inputs.quaid_version }}"
          file_pattern: 'results/*.json site/src/data/*.json'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Astro site
        working-directory: site
        run: npm install && npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/dist
