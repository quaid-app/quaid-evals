name: Run Benchmarks (On Quaid Release)

on:
  repository_dispatch:
    types: [quaid-released]
  workflow_dispatch:
    inputs:
      quaid_version:
        description: 'Quaid version to test'
        required: false
        default: 'latest'
      benchmarks:
        description: 'Benchmarks to run (comma-separated: dab,gbrain-evals,locomo,beam)'
        required: false
        default: 'dab,gbrain-evals,locomo'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.client_payload.version || inputs.quaid_version || 'latest' }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine benchmarks
        id: benchmarks
        run: |
          BENCHMARKS="${{ github.event.client_payload.benchmarks || inputs.benchmarks || 'dab,gbrain-evals,locomo' }}"
          echo "benchmarks=$BENCHMARKS" >> $GITHUB_OUTPUT

      - name: Install Quaid
        run: bash scripts/install-quaid.sh "${{ steps.version.outputs.version }}"

      - name: Set up corpus
        run: bash scripts/setup-corpus.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run DAB benchmark
        if: contains(steps.benchmarks.outputs.benchmarks, 'dab')
        run: bash benchmarks/dab/run.sh

      - name: Run gbrain-evals benchmark
        if: contains(steps.benchmarks.outputs.benchmarks, 'gbrain-evals')
        run: bash benchmarks/gbrain-evals/run.sh

      - name: Run LoCoMo benchmark
        if: contains(steps.benchmarks.outputs.benchmarks, 'locomo')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash benchmarks/locomo/run.sh

      - name: Run BEAM benchmark
        if: contains(steps.benchmarks.outputs.benchmarks, 'beam')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: bash benchmarks/beam/run.sh

      - name: Generate report
        run: python scripts/generate-report.py

      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "benchmark: quaid ${{ steps.version.outputs.version }} results"
          file_pattern: 'results/*.json site/src/data/*.json'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Astro site
        working-directory: site
        run: npm install && npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/dist
